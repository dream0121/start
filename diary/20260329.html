<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>2026年3月29日</title>
    <Style>
        .diary-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
            text-align: center;
            }

        .diary-date {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
            text-align: center;
            }

        table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid #ddd;
            margin-top: 10px;
            }

        th, td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: left;
            }

        th {
            background-color: #f2f2f2;
            color: #333;
            font-weight: bold;
            text-align: center;
            }
        
        td:first-child,
        th:first-child {
            text-align: center;
            width: 15%;
            }
        
        td:nth-child(2),
        th:nth-child(2) {
            width: 25%;
            }

        td:last-child,
        th:last-child {
            width: 60%;
            }
        span.tubiao{
            font-size: 50px;
        }

    </Style>
</head>
