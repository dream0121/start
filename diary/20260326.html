<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的日记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f9f9f9;
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.8;
            color: #333;
        }
        .diary-title {
            font-size: 24px;
            font-weight: normal;
            margin-bottom: 10px;
            color: #222;
        }
        .diary-date {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }
        .diary-content {
            font-size: 16px;
            text-align: justify;
        }
        p {
            margin-bottom: 18px;
        }
    </style>
</head>
<body>
    <h1 class="diary-title">我的日记</h1>
    <div class="diary-date">2026年03月25日 星期三</div>
    <div class="diary-content">
        <p>今天天气很好，阳光透过窗户洒在桌面上，让人心情格外舒畅。</p>
        <p>上午整理了一些工作和学习资料，效率比平时高了不少。偶尔停下脚步，安静地做一件事，反而能感受到生活最真实的美好。</p>
        <p>傍晚出门散步，吹着微风，看着路边的花草，一天的疲惫都慢慢消散了。希望明天也能像今天一样，平静又充实。</p>
    </div>
</body>
</html>
